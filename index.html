<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pixel Shuffle</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>

      <a
        class="github-link"
        href="https://github.com/ctx-0/pixl"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open Pixl on GitHub"
        title="GitHub"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M12 2C6.48 2 2 6.58 2 12.26c0 4.54 2.87 8.39 6.84 9.75.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.37-3.37-1.37-.45-1.19-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.86.09-.67.35-1.12.63-1.38-2.22-.26-4.55-1.14-4.55-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 7.02c.85 0 1.7.12 2.5.34 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.05.36.32.68.95.68 1.92 0 1.38-.01 2.5-.01 2.84 0 .27.18.59.69.49A10.08 10.08 0 0 0 22 12.26C22 6.58 17.52 2 12 2Z"
          />
        </svg>
      </a>

      <div class="figure-title">
        <div class="eyebrow" id="figureEyebrow">
          space-to-depth · pixel unshuffle
        </div>
        <div class="path">
          <div class="title" id="figureTitle">Space-to-depth pixel shuffle</div>
          <div class="step" data-path-index="0">64×64×1</div>
          <div class="sep">→</div>
          <div class="step" data-path-index="1">32×32×4</div>
          <div class="sep">→</div>
          <div class="step" data-path-index="2">16×16×16</div>
          <div class="sep">→</div>
          <div class="step" data-path-index="3">8×8×64</div>
        </div>
      </div>

      <div class="camera-pop" id="cameraPopover">
        <div class="camera-head">
          <span>Camera</span>
          <span id="camState">manual</span>
        </div>
        <div class="camera-rows">
          <div class="camera-row">
            <label for="yaw">Yaw</label>
            <input
              id="yaw"
              type="range"
              min="-2.1"
              max="2.1"
              step="0.01"
              value="0.72"
            />
          </div>
          <div class="camera-row">
            <label for="pitch">Pitch</label>
            <input
              id="pitch"
              type="range"
              min="-0.15"
              max="1.30"
              step="0.01"
              value="0.58"
            />
          </div>
          <div class="camera-row">
            <label for="zoom">Zoom</label>
            <input
              id="zoom"
              type="range"
              min="0.65"
              max="1.85"
              step="0.01"
              value="1.05"
            />
          </div>
          <div class="camera-row">
            <label for="depth">Depth</label>
            <input
              id="depth"
              type="range"
              min="0.80"
              max="2.30"
              step="0.01"
              value="1.45"
            />
          </div>
        </div>
      </div>

      <div class="control-card" id="controlCard">
        <div class="card-top">
          <div class="meta">
            <div class="label">Current mapping</div>
            <div class="shape" id="shapeCopy">64×64×1 → 32×32×4</div>
          </div>
          <div class="actions">
            <button id="playBtn" class="iconbtn" title="Play" aria-label="Play">
              ▶
            </button>
            <button
              id="resetBtn"
              class="iconbtn"
              title="Reset"
              aria-label="Reset"
            >
              ↺
            </button>
            <button
              id="collapseBtn"
              class="iconbtn collapse-btn"
              title="Collapse controls"
              aria-label="Collapse controls"
              aria-expanded="true"
              aria-controls="controlCardBody"
            >
              −
            </button>
          </div>
        </div>

        <div class="control-card-body" id="controlCardBody">
          <div class="segmented">
            <button id="packBtn" class="active">Unshuffle</button>
            <button id="unpackBtn">Shuffle</button>
          </div>

          <div class="preset-block">
            <div class="preset-label">Image</div>
            <div class="preset-strip" id="presetStrip"></div>
          </div>

          <div class="status" id="stageCopy">
            Space-to-depth Blue — original spatial image.
          </div>

          <div class="scrub">
            <div class="rail-wrap">
              <div class="rail"></div>
              <div class="fill" id="fill"></div>
              <input
                id="progress"
                type="range"
                min="0"
                max="1"
                step="0.001"
                value="0"
              />
            </div>
            <div class="stage-dots" id="stageNodes"></div>
          </div>

          <div class="card-bottom">
            <div class="tiny-pill" id="modePill">pack · manual</div>
            <div class="right">
              <button id="orbitBtn">Orbit</button>
              <button id="cameraBtn">Camera</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
